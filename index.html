<!DOCTYPE html>
<html>
<head>
  <title>Clarity</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(to bottom, #f8fbfc, #eef3f5);
      color: #2f3a3d;
      padding: 30px 20px;
      max-width: 760px;
      margin: 0 auto;
    }

    .container {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(180, 190, 195, 0.25);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(80, 100, 110, 0.08);
      backdrop-filter: blur(8px);
    }

    h1 {
      text-align: center;
      font-weight: 600;
      font-size: 2rem;
      letter-spacing: 0.5px;
      color: #334246;
      margin-bottom: 8px;
    }

    .subtext {
      text-align: center;
      color: #6c7b80;
      margin-bottom: 28px;
      font-size: 0.98rem;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-size: 0.92rem;
      font-weight: 600;
      color: #516066;
    }

    input, textarea, select {
      width: 100%;
      margin: 0 0 8px;
      padding: 14px;
      box-sizing: border-box;
      border: 1px solid #d8e1e4;
      border-radius: 14px;
      background: #ffffff;
      color: #2f3a3d;
      font-size: 0.98rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #a8c0c8;
      box-shadow: 0 0 0 4px rgba(168, 192, 200, 0.16);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    input::placeholder,
    textarea::placeholder {
      color: #95a3a8;
    }

    button {
      width: 100%;
      background: linear-gradient(to right, #7fa8b2, #8fb7a3);
      color: white;
      border: none;
      padding: 14px 18px;
      cursor: pointer;
      border-radius: 14px;
      margin-top: 14px;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    .entries-title {
      margin-top: 30px;
      margin-bottom: 10px;
      font-size: 1rem;
      color: #5d6c71;
      font-weight: 600;
    }

    .entry {
      background: #ffffff;
      padding: 16px;
      margin-top: 14px;
      border: 1px solid #e1e8ea;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(90, 110, 120, 0.05);
    }

    .entry-person {
      font-weight: 700;
      color: #344347;
      margin-bottom: 8px;
    }

    .entry-line {
      margin: 6px 0;
      color: #526267;
    }

    .entry-label {
      font-weight: 600;
      color: #6a7a7f;
    }

    .flag {
      margin-top: 10px;
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef4f2;
      color: #567067;
      font-size: 0.82rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Clarity</h1>
    <div class="subtext">Observe clearly. Record honestly. Let patterns speak for themselves.</div>

    <label for="person">Person</label>
    <input id="person" placeholder="Who is this entry about?">

    <label for="said">What they said</label>
    <textarea id="said" placeholder="Write what was said or claimed."></textarea>

    <label for="noticed">What you noticed</label>
    <textarea id="noticed" placeholder="Write what stood out, felt off, or did not match."></textarea>

    <label for="flag">Pattern level</label>
    <select id="flag">
      <option value="1">Steady</option>
      <option value="2">Slight shift</option>
      <option value="3">Something to note</option>
      <option value="4">Concerning</option>
      <option value="5">Clear pattern</option>
    </select>

    <button onclick="addEntry()">Add Entry</button>

    <div class="entries-title">Entries</div>
    <div id="entries"></div>
  </div>

  <script>
    let entries = JSON.parse(localStorage.getItem('clarity')) || [];

    function render() {
      const entriesDiv = document.getElementById('entries');
      entriesDiv.innerHTML = '';

      entries.forEach(e => {
        let div = document.createElement('div');
        div.className = 'entry';
        div.innerHTML = `
          <div class="entry-person">${e.person}</div>
          <div class="entry-line"><span class="entry-label">Said:</span> ${e.said}</div>
          <div class="entry-line"><span class="entry-label">Observed:</span> ${e.noticed}</div>
          <div class="flag">${e.flag}</div>
        `;
        entriesDiv.appendChild(div);
      });
    }

    function addEntry() {
      let entry = {
        person: document.getElementById('person').value,
        said: document.getElementById('said').value,
        noticed: document.getElementById('noticed').value,
        flag: document.getElementById('flag').value
      };

      entries.push(entry);
      localStorage.setItem('clarity', JSON.stringify(entries));
      render();

      document.getElementById('person').value = '';
      document.getElementById('said').value = '';
      document.getElementById('noticed').value = '';
      document.getElementById('flag').value = '1';
    }

    render();
  </script>
</body>
</html>
